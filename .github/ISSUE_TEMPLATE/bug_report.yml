name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide steps, config shape, and command output with secrets removed.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA or package version.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, Node version, pnpm version, and client.
    validations:
      required: false
