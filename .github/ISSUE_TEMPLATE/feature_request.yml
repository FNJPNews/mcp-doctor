name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the requested behavior.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security considerations
      description: Describe any local execution, file access, or secret-handling implications.
    validations:
      required: false
